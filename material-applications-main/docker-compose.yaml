services:
  frontend:
    build: ./example-frontend
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8080/api/ping/

  backend:
    build: ./example-backend
    ports:
      - 8080:8080
    environment:
      - PORT=8080
      - REQUEST_ORIGIN=http://localhost:5001
      - REDIS_HOST=redis
      # These variables tell the backend application how to find the database
      - DB_HOST=database
      - DB_USER=postgres
      - DB_NAME=postgres
      - DB_PASSWORD= password
    depends_on:
      - database
      - redis
    restart: unless-stopped

  redis:
    image: redis
    restart: unless-stopped
    volumes:
      - ./redis:/data

# Postgres service
  database:
    image: postgres:16
    restart: unless-stopped
    environment:
      # Configuration for initialization of Postgres itself
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      # Named volume mapping to retain database state
      - ./database:/var/lib/postgresql/data
  nginx:
    image: nginx
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
